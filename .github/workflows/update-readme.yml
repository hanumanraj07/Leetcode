name: README Update + Snake Animation

on:
  schedule:
    - cron: "0 * * * *"   # Every 2 hours (README update)
    - cron: "0 0 * * *"    # Daily at midnight (Snake)
  workflow_dispatch:

jobs:

  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update README content
        run: |
          DATE=$(date)
          perl -0777 -i -pe 's/<!-- AUTO-UPDATE-START -->.*?<!-- AUTO-UPDATE-END -->/<!-- AUTO-UPDATE-START -->\nLast updated: '"$DATE"'\nThis update was done using GitHub Actions 🚀\n<!-- AUTO-UPDATE-END -->/s' README.md

      - name: Commit and push changes
        run: |
          git config user.name "hanumanraj07"
          git config user.email "hanuman.rajpurohit.cg@gmail.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Automated README update"
          git push

  generate-snake:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: hanumanraj07
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
