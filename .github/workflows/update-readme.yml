name: Update README

on:
  schedule:
    - cron: "* * * * *"   # runs every hour
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update README content
        run: |
          DATE=$(date)
          perl -0777 -i -pe 's/<!-- AUTO-UPDATE-START -->.*?<!-- AUTO-UPDATE-END -->/<!-- AUTO-UPDATE-START -->\nLast updated: '"$DATE"'\nThis update was done using GitHub Actions 🚀\n<!-- AUTO-UPDATE-END -->/s' README.md

      - name: Commit and push changes
        run: |
          git config user.name "hanumanraj07"
          git config user.email "hanuman.rajpurohit.cg@gmail.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Automated README update"
          git push
